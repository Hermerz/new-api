name: CI - Staging / Prod

on:
  push:
    branches: [staging, hermes-main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        run: |
          TAGS="ghcr.io/${{ env.GHCR_OWNER }}/new-api-official:${{ github.sha }}"
          if [ "${{ github.ref_name }}" = "staging" ]; then
            TAGS="${TAGS},ghcr.io/${{ env.GHCR_OWNER }}/new-api-official:staging"
          elif [ "${{ github.ref_name }}" = "hermes-main" ]; then
            TAGS="${TAGS},ghcr.io/${{ env.GHCR_OWNER }}/new-api-official:latest"
          fi
          echo "IMAGE_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAGS }}
